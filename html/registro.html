<body>
    <header>
        <h1 class="logo">EDUPARK</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#">Registro</a></li>
                <li><a href="inicio_sesion.html">Inicio sesión</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <form class="form-registro" action="registrar.php" method="POST">

            <h2>Registro</h2>

            <!-- Nombre -->
            <section>
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>
            </section>

            <!-- Correo -->
            <section>
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com" required>
            </section>

            <!-- Contraseña -->
            <section>
                <label for="clave">Contraseña:</label>
                <input type="password" id="clave" name="clave" placeholder="Tu contraseña" minlength="6" required>
            </section>

            <!-- Confirmar contraseña -->
            <section>
            <label for="confirmar">Confirma tu contraseña:</label>
            <input type="password" id="confirmar" name="confirmar" placeholder="Repite tu contraseña" minlength="6" required>
            </section>

            <!-- Botón de envío -->
            <button type="submit"><a class="registro" href="inicio_sesion.html">Registrarse</a></button>

        </form>

        <figure>
            <img class="register" src="../multimedia/images/register.png" alt="register">
        </figure>

    </main>

    <footer style="background: #111; color: #fff; text-align: center; padding: 20px 10px; width: 100vw;">
