<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="icon" type="image/jpg" href="../multimedia/images/logo.jpg">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/body.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>

        <img class="logo" src="../multimedia/images/logo.jpg" alt="Logo institucional">

        <nav>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#">Registro</a></li>
                <li><a href="login.html">Inicio de sesión</a></li>
            </ul>
        </nav>
        
    </header>

    <main>

        <form id="form-register" action="successful_registration.html" method="POST">

            <h2>Crear cuenta</h2>

            <!-- Nombre -->
            <section>
                <label for="name">Nombre completo</label>
                <input type="text" id="name" name="name" placeholder="Escribe tu nombre de usuario" required>
            </section>

            <!-- Contraseña -->
            <section>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Escribe tu contraseña" minlength="6" required>
            </section>

            <!-- Confirmar contraseña -->
            <section>
            <label for="confirmpassword">Confirmar contraseña</label>
            <input type="password" id="confirmpassword" name="confirm-password" placeholder="Confirma tu contraseña" minlength="6" required>
            </section>

            <!-- Selector -->
            <section class="contenedor-role">
                <select id="role" name="role" class="select-moderno" required>
                    <option value="">Seleccionar rol</option>
                    <option id="admin" value="Maestro">Maestro</option>
                    <option id="user" value="Estudiante">Estudiante</option>
                </select>
            </section>

            <!-- Botón de envío -->
            <button type="submit" class="register">REGISTRAR</button>

        </form>

        <figure>
            <img class="register-img" src="../multimedia/images/register.png" alt="register-img">
        </figure>

    </main>

    <footer>

    <!-- ICONOS (izquierda) -->
    <div id="redes">
        <a class="red" href="https://wa.me/573227892993" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
        </a>

        <a class="red" href="https://instagram.com" target="_blank">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a class="red" href="https://facebook.com" target="_blank">
            <i class="fa-brands fa-facebook-f"></i>
        </a>

        <a class="red" href="https://twitter.com" target="_blank">
            <i class="fa-brands fa-x-twitter"></i>
        </a>
    </div>

    <!-- TEXTO (centrado en la misma línea) -->
    <div id="rights">
        <p>• Todos los derechos reservados</p>
        <p>&copy; 2026</p>
    </div>

    <div>
        <img class="logo" src="../multimedia/images/logo.jpg" alt="Logo institucional">
    </div>

    </footer>

    <script src="../js/register.js"></script>
    
</body>
</html>
