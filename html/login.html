<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="icon" type="image/jpg" href="../multimedia/images/logo.jpg">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/body.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>

        <img class="logo" src="../multimedia/images/logo.jpg" alt="Logo institucional">

        <nav>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="register.html">Registro</a></li>
                <li><a href="#">Inicio de sesión</a></li>
            </ul>
        </nav>
        
    </header>

    <main>

        <figure>
            <img class="login-img" src="../multimedia/images/login.png" alt="login-img">
        </figure>

        <form id="form-register" action="#" method="GET">

            <h2>Inicio de sesión</h2>

            <section>
                <label for="user">Nombre de usuario</label>
                <input type="text" id="user" name="user" placeholder="Escribe tu nombre de usuario" required>
            </section>

            <a id="la" href="#">No recuerdo el nombre de usuario</a>

            <section>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Escribe tu contraseña" required>
            </section>

            <a id="la" href="#">No recuerdo la contraseña</a>

            <button type="submit" class="register">ENTRAR</button>
            
        </form>

    </main>

    <footer>

    <!-- ICONOS (izquierda) -->
    <div id="redes">
        <a class="red" href="https://wa.me/573227892993" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
        </a>

        <a class="red" href="https://instagram.com" target="_blank">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a class="red" href="https://facebook.com" target="_blank">
            <i class="fa-brands fa-facebook-f"></i>
        </a>

        <a class="red" href="https://twitter.com" target="_blank">
            <i class="fa-brands fa-x-twitter"></i>
        </a>
    </div>

    <!-- TEXTO (centrado en la misma línea) -->
    <div id="rights">
        <p>• Todos los derechos reservados</p>
        <p>&copy; 2026</p>
    </div>

    <div>
        <img class="logo" src="../multimedia/images/logo.jpg" alt="Logo institucional">
    </div>

    </footer>

    <script src="../js/login.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/js/all.min.js" crossorigin="anonymous"></script>
  
</body>
</html>
